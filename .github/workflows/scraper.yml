name: Actualizar Ranking

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Crear archivo de sesión
        run: echo '${{ secrets.POLLAYA_SESSION }}' > pollaya_session.json

      - name: Correr scraper
        env:
          POLLAYA_EMAIL: ${{ secrets.POLLAYA_EMAIL }}
          POLLAYA_PASSWORD: ${{ secrets.POLLAYA_PASSWORD }}
        run: python pollaya.py
      
      - name: Verificar archivos generados
        run: ls -la *.html || echo "No hay archivos HTML"

      - name: Publicar en GitHub Pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "actualizar ranking"
          git push